<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2b6cb0"/>
      <stop offset="100%" style="stop-color:#1a365d"/>
    </linearGradient>
    <linearGradient id="switchL3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38a169"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
    <linearGradient id="switchL2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dd6b20"/>
      <stop offset="100%" style="stop-color:#c05621"/>
    </linearGradient>
    <linearGradient id="pcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
    <linearGradient id="tunnelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9f7aea"/>
      <stop offset="100%" style="stop-color:#805ad5"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="650" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a365d">Project 7 — Full Enterprise Network Simulation</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" fill="#718096">Daksh Patel | CCNA Certified | Cisco Packet Tracer</text>

  <!-- HQ Zone -->
  <rect x="30" y="65" width="500" height="570" rx="10" fill="none" stroke="#2b6cb0" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="280" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">HEADQUARTERS</text>

  <!-- Branch Zone -->
  <rect x="620" y="65" width="450" height="570" rx="10" fill="none" stroke="#dd6b20" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="845" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#dd6b20">BRANCH OFFICE</text>

  <!-- WAN Link -->
  <line x1="380" y1="155" x2="740" y2="155" stroke="#4a5568" stroke-width="3"/>
  <text x="560" y="145" text-anchor="middle" font-size="10" fill="#4a5568">WAN Link — 10.0.0.0/30</text>

  <!-- GRE Tunnel -->
  <path d="M 380 170 Q 560 220 740 170" stroke="url(#tunnelGrad)" stroke-width="3" stroke-dasharray="8,4" fill="none"/>
  <text x="560" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#805ad5">GRE Tunnel10 — 172.16.0.0/30</text>

  <!-- Router-HQ -->
  <rect x="290" y="120" width="180" height="50" rx="8" fill="url(#routerGrad)" filter="url(#shadow)"/>
  <text x="380" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Router-HQ</text>
  <text x="380" y="158" text-anchor="middle" font-size="9" fill="#bee3f8">2911 | GigE0/1: 10.0.0.1</text>

  <!-- Router-Branch -->
  <rect x="650" y="120" width="180" height="50" rx="8" fill="url(#routerGrad)" filter="url(#shadow)"/>
  <text x="740" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Router-Branch</text>
  <text x="740" y="158" text-anchor="middle" font-size="9" fill="#bee3f8">2911 | GigE0/1: 10.0.0.2</text>

  <!-- Link Router-HQ to Core-SW-HQ -->
  <line x1="380" y1="170" x2="280" y2="260" stroke="#4a5568" stroke-width="2"/>
  <text x="310" y="220" text-anchor="middle" font-size="8" fill="#718096">GigE0/0</text>
  <text x="310" y="232" text-anchor="middle" font-size="8" fill="#718096">192.168.1.1</text>

  <!-- Core-SW-HQ -->
  <rect x="170" y="260" width="220" height="50" rx="8" fill="url(#switchL3Grad)" filter="url(#shadow)"/>
  <text x="280" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Core-SW-HQ</text>
  <text x="280" y="298" text-anchor="middle" font-size="9" fill="#c6f6d5">3560 L3 | GigE0/1: 192.168.1.2</text>

  <!-- Link Core-SW to Access-SW-HQ -->
  <line x1="230" y1="310" x2="230" y2="380" stroke="#4a5568" stroke-width="2"/>
  <text x="210" y="350" text-anchor="middle" font-size="8" fill="#718096">Trunk</text>
  <text x="210" y="362" text-anchor="middle" font-size="8" fill="#718096">Fa0/1</text>

  <!-- Access-SW-HQ -->
  <rect x="120" y="380" width="220" height="50" rx="8" fill="url(#switchL2Grad)" filter="url(#shadow)"/>
  <text x="230" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Access-SW-HQ</text>
  <text x="230" y="418" text-anchor="middle" font-size="9" fill="#fefcbf">2960 L2 | VLANs 10,20,30</text>

  <!-- PC-Admin (off Core-SW) -->
  <line x1="390" y1="285" x2="460" y2="340" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="420" y="340" width="110" height="45" rx="6" fill="url(#pcGrad)" filter="url(#shadow)"/>
  <text x="475" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PC-Admin</text>
  <text x="475" y="373" text-anchor="middle" font-size="8" fill="#e2e8f0">192.168.30.10</text>
  <text x="475" y="393" text-anchor="middle" font-size="8" fill="#38a169">VLAN 30</text>

  <!-- PC-IT -->
  <line x1="150" y1="430" x2="100" y2="490" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="45" y="490" width="110" height="45" rx="6" fill="url(#pcGrad)" filter="url(#shadow)"/>
  <text x="100" y="508" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PC-IT</text>
  <text x="100" y="523" text-anchor="middle" font-size="8" fill="#e2e8f0">192.168.10.10</text>
  <text x="100" y="543" text-anchor="middle" font-size="8" fill="#38a169">VLAN 10</text>

  <!-- PC-HR -->
  <line x1="230" y1="430" x2="230" y2="490" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="175" y="490" width="110" height="45" rx="6" fill="url(#pcGrad)" filter="url(#shadow)"/>
  <text x="230" y="508" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PC-HR</text>
  <text x="230" y="523" text-anchor="middle" font-size="8" fill="#e2e8f0">192.168.20.10</text>
  <text x="230" y="543" text-anchor="middle" font-size="8" fill="#38a169">VLAN 20</text>

  <!-- PC-Mgmt -->
  <line x1="310" y1="430" x2="360" y2="490" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="305" y="490" width="110" height="45" rx="6" fill="url(#pcGrad)" filter="url(#shadow)"/>
  <text x="360" y="508" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PC-Mgmt</text>
  <text x="360" y="523" text-anchor="middle" font-size="8" fill="#e2e8f0">192.168.30.20</text>
  <text x="360" y="543" text-anchor="middle" font-size="8" fill="#38a169">VLAN 30</text>

  <!-- Link Router-Branch to Access-SW-Branch -->
  <line x1="740" y1="170" x2="845" y2="310" stroke="#4a5568" stroke-width="2"/>
  <text x="810" y="240" text-anchor="middle" font-size="8" fill="#718096">GigE0/0</text>
  <text x="810" y="252" text-anchor="middle" font-size="8" fill="#718096">192.168.40.1</text>

  <!-- Access-SW-Branch -->
  <rect x="735" y="310" width="220" height="50" rx="8" fill="url(#switchL2Grad)" filter="url(#shadow)"/>
  <text x="845" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Access-SW-Branch</text>
  <text x="845" y="348" text-anchor="middle" font-size="9" fill="#fefcbf">2960 L2 | 192.168.40.0/24</text>

  <!-- PC-Sales -->
  <line x1="800" y1="360" x2="760" y2="430" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="700" y="430" width="120" height="45" rx="6" fill="url(#pcGrad)" filter="url(#shadow)"/>
  <text x="760" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PC-Sales</text>
  <text x="760" y="463" text-anchor="middle" font-size="8" fill="#e2e8f0">192.168.40.10</text>

  <!-- PC-Support -->
  <line x1="890" y1="360" x2="930" y2="430" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="870" y="430" width="120" height="45" rx="6" fill="url(#pcGrad)" filter="url(#shadow)"/>
  <text x="930" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PC-Support</text>
  <text x="930" y="463" text-anchor="middle" font-size="8" fill="#e2e8f0">192.168.40.20</text>

  <!-- ACL Shield -->
  <rect x="700" y="500" width="290" height="55" rx="8" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5" opacity="0.9"/>
  <text x="845" y="518" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">ACL 101 — Security Policy</text>
  <text x="845" y="533" text-anchor="middle" font-size="9" fill="#c53030">❌ Branch → HR (DENY) | ❌ Branch → Mgmt (DENY)</text>
  <text x="845" y="546" text-anchor="middle" font-size="9" fill="#276749">✅ Branch → IT (PERMIT)</text>

  <!-- Legend -->
  <rect x="40" y="575" width="480" height="55" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
  <text x="55" y="593" font-size="10" font-weight="bold" fill="#1a365d">Legend:</text>
  <rect x="55" y="600" width="14" height="10" rx="2" fill="url(#routerGrad)"/>
  <text x="75" y="609" font-size="9" fill="#4a5568">Router (2911)</text>
  <rect x="160" y="600" width="14" height="10" rx="2" fill="url(#switchL3Grad)"/>
  <text x="180" y="609" font-size="9" fill="#4a5568">L3 Switch (3560)</text>
  <rect x="280" y="600" width="14" height="10" rx="2" fill="url(#switchL2Grad)"/>
  <text x="300" y="609" font-size="9" fill="#4a5568">L2 Switch (2960)</text>
  <rect x="400" y="600" width="14" height="10" rx="2" fill="url(#pcGrad)"/>
  <text x="420" y="609" font-size="9" fill="#4a5568">End Host</text>
  <line x1="55" y1="622" x2="80" y2="622" stroke="#805ad5" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="85" y="626" font-size="9" fill="#4a5568">GRE Tunnel</text>
</svg>
